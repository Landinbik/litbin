<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mdbin</title>
  <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --header-bg: #1f2328;
      --header-text: #f0f6fc;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --header-bg: #161b22;
      --header-text: #e6edf3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      height: 48px;
      background: var(--header-bg);
      color: var(--header-text);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.4px;
      color: var(--header-text);
      text-decoration: none;
    }
    .spacer { flex: 1; }
    #urlSize {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.4);
    }
    #urlSize.warn  { color: #e3b341; }
    #urlSize.over  { color: #f85149; }

    .btn {
      padding: 5px 13px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: var(--header-text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .btn.primary:hover { filter: brightness(1.1); }

    /* ── Mobile tab bar ── */
    .tab-bar {
      display: none;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-bar button {
      flex: 1;
      padding: 9px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
    }
    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main split ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      flex-shrink: 0;
      user-select: none;
    }
    #editorPane { flex: 1; min-width: 100px; }
    #previewPane { flex: 1; min-width: 100px; }

    /* ── Divider ── */
    #divider {
      width: 5px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
    }
    #divider:hover, #divider.active { background: var(--accent); }

    /* ── Editor ── */
    #editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      font-family: 'SFMono-Regular', 'Cascadia Code', 'Consolas', 'Liberation Mono', monospace;
      font-size: 14px;
      line-height: 1.65;
      background: var(--bg);
      color: var(--text);
      tab-size: 2;
    }

    /* ── Preview ── */
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 40px;
    }

    /* GitHub-flavored prose — shared by preview and live blocks */
    .md-body > *:first-child { margin-top: 0 !important; }

    .md-body h1, .md-body h2 {
      border-bottom: 1px solid var(--border);
      padding-bottom: .3em;
    }
    .md-body h1 { font-size: 2em;    margin: 1.5em 0 .5em; }
    .md-body h2 { font-size: 1.5em;  margin: 1.5em 0 .5em; }
    .md-body h3 { font-size: 1.25em; margin: 1.5em 0 .5em; }
    .md-body h4, .md-body h5, .md-body h6 { margin: 1.2em 0 .5em; }

    .md-body p  { margin-bottom: 1em; line-height: 1.75; }
    .md-body a  { color: var(--accent); }
    .md-body a:hover { text-decoration: underline; }

    .md-body ul, .md-body ol { margin-bottom: 1em; padding-left: 2em; }
    .md-body li { margin-bottom: .3em; line-height: 1.75; }
    .md-body li > ul, .md-body li > ol { margin-bottom: 0; margin-top: .3em; }

    .md-body blockquote {
      border-left: 4px solid var(--border);
      padding: 0 1em;
      color: var(--text-muted);
      margin-bottom: 1em;
    }

    .md-body code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: .875em;
      font-family: 'SFMono-Regular', monospace;
    }
    .md-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: .85em;
    }

    .md-body table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    .md-body th, .md-body td {
      border: 1px solid var(--border);
      padding: 7px 13px;
      text-align: left;
    }
    .md-body th { background: var(--surface); font-weight: 600; }
    .md-body tr:nth-child(even) td { background: var(--surface); }

    .md-body img  { max-width: 100%; border-radius: 4px; }
    .md-body hr   { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    .md-body input[type="checkbox"] { margin-right: 6px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1f2328;
      color: #f0f6fc;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Live pane ── */
    #livePane {
      display: none;
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }
    #liveContent {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 28px 160px;
      width: 100%;
    }
    .live-block {
      border-radius: 5px;
      padding: 2px 8px;
      margin: 0 -8px;
      cursor: text;
      min-height: 1.4em;
      transition: background 0.1s;
    }
    .live-block:hover { background: var(--surface); }
    /* Suppress inner margins — spacing comes from explicit spacer divs */
    .live-block > *:first-child { margin-top: 0 !important; }
    .live-block > *:last-child  { margin-bottom: 0 !important; }
    .live-spacer {
      height: 1.5em;
      cursor: text;
      margin: 0 -8px;
      border-radius: 5px;
    }
    .live-spacer:hover { background: var(--surface); }
    .live-ta {
      display: block;
      width: calc(100% + 16px);
      margin: 0 -8px;
      border: none;
      outline: none;
      resize: none;
      overflow: hidden;
      background: var(--surface);
      color: var(--text);
      font-family: 'SFMono-Regular', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.65;
      padding: 4px 8px;
      border-radius: 5px;
      border-left: 3px solid var(--accent);
      caret-color: var(--accent);
    }
    .live-bottom {
      min-height: 120px;
      cursor: text;
    }

    /* ── Code execution ── */
    .code-block-wrap {
      position: relative;
      margin-bottom: 1em;
    }
    .code-block-wrap .md-body pre,
    .code-block-wrap pre { margin-bottom: 0; }
    .run-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      opacity: 0.85;
      transition: opacity 0.15s, filter 0.15s;
      z-index: 1;
    }
    .run-btn:hover  { opacity: 1; filter: brightness(1.1); }
    .run-btn:disabled { opacity: 0.5; cursor: default; filter: none; }
    .code-output {
      display: none;
      font-family: 'SFMono-Regular', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.55;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 12px 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .code-output.visible { display: block; }
    .code-output .out-err  { color: #f85149; }
    .code-output .out-meta { color: #6e7681; font-style: italic; font-size: 12px; }

    /* ── Mobile overrides ── */
    @media (max-width: 700px) {
      .tab-bar { display: flex; }
      #divider  { display: none; }
      .pane-label { display: none; }
      #editorPane, #previewPane { display: none; flex: 1; }
      #editorPane.mobile-active, #previewPane.mobile-active { display: flex; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">mdbin</a>
    <div class="spacer"></div>
    <span id="urlSize"></span>
    <button class="btn" id="modeBtn">Live</button>
    <button class="btn" id="themeBtn">Dark</button>
    <button class="btn primary" id="shareBtn">Copy URL</button>
  </header>

  <div class="tab-bar">
    <button class="active" data-target="editorPane">Edit</button>
    <button data-target="previewPane">Preview</button>
  </div>

  <main>
    <div class="pane" id="editorPane">
      <div class="pane-label">Markdown</div>
      <textarea id="editor" spellcheck="false" placeholder="Write some markdown…"></textarea>
    </div>
    <div id="divider"></div>
    <div class="pane" id="previewPane">
      <div class="pane-label">Preview</div>
      <div id="preview" class="md-body"></div>
    </div>
  </main>

  <div id="livePane">
    <div id="liveContent"></div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/d.min.js"></script>
  <script>

    const editor   = document.getElementById('editor');
    const preview  = document.getElementById('preview');
    const shareBtn = document.getElementById('shareBtn');
    const themeBtn = document.getElementById('themeBtn');
    const urlSize  = document.getElementById('urlSize');
    const toast    = document.getElementById('toast');
    const divider  = document.getElementById('divider');
    const hljsLink = document.getElementById('hljs-theme');
    const editorPane  = document.getElementById('editorPane');
    const previewPane = document.getElementById('previewPane');

    // ── Theme ────────────────────────────────────────────────────────────────
    let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function applyTheme() {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      themeBtn.textContent = dark ? 'Light' : 'Dark';
      hljsLink.href = dark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    }
    themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });
    applyTheme();

    // ── Codec ────────────────────────────────────────────────────────────────
    const encode = t => LZString.compressToEncodedURIComponent(t);
    const decode = h => LZString.decompressFromEncodedURIComponent(h) || '';

    // ── Marked options ───────────────────────────────────────────────────────
    marked.use({ breaks: true, gfm: true });

    // ── Code execution (Wandbox API) ─────────────────────────────────────────
    const EXEC_LANGS = {
      // Python
      python:        { compiler: 'cpython-3.13.8',        options: '' },
      python3:       { compiler: 'cpython-3.13.8',        options: '' },
      py:            { compiler: 'cpython-3.13.8',        options: '' },
      // C / C++
      c:             { compiler: 'gcc-head-c',            options: '-std=c11 -lm' },
      cpp:           { compiler: 'gcc-head',              options: '-std=c++23' },
      'c++':         { compiler: 'gcc-head',              options: '-std=c++23' },
      cxx:           { compiler: 'gcc-head',              options: '-std=c++23' },
      // Lisp
      lisp:          { compiler: 'clisp-2.49',            options: '' },
      'common-lisp': { compiler: 'clisp-2.49',            options: '' },
      commonlisp:    { compiler: 'clisp-2.49',            options: '' },
      // Systems
      rust:          { compiler: 'rust-1.82.0',           options: '' },
      rs:            { compiler: 'rust-1.82.0',           options: '' },
      go:            { compiler: 'go-1.23.2',             options: '' },
      zig:           { compiler: 'zig-0.13.0',            options: '' },
      d:             { compiler: 'dmd-2.109.1',           options: '' },
      nim:           { compiler: 'nim-2.2.8',             options: '', rawOptions: '--hints:off' },
      // JVM
      java:          { compiler: 'openjdk-jdk-22+36',     options: '', transform: c => c.replace(/\bpublic\s+class\b/g, 'class') },
      groovy:        { compiler: 'groovy-4.0.23',         options: '' },
      // Scripting
      javascript:    { compiler: 'nodejs-20.17.0',        options: '' },
      js:            { compiler: 'nodejs-20.17.0',        options: '' },
      typescript:    { compiler: 'typescript-5.6.2',      options: '' },
      ts:            { compiler: 'typescript-5.6.2',      options: '' },
      ruby:          { compiler: 'ruby-3.4.1',            options: '' },
      rb:            { compiler: 'ruby-3.4.1',            options: '' },
      php:           { compiler: 'php-8.3.12',            options: '' },
      perl:          { compiler: 'perl-5.42.0',           options: '' },
      pl:            { compiler: 'perl-5.42.0',           options: '' },
      lua:           { compiler: 'lua-5.4.7',             options: '' },
      bash:          { compiler: 'bash',                  options: '' },
      sh:            { compiler: 'bash',                  options: '' },
      // Functional
      haskell:       { compiler: 'ghc-9.10.1',            options: '' },
      hs:            { compiler: 'ghc-9.10.1',            options: '' },
      // ocaml: broken on Wandbox (opam missing server-side)
      // erlang: broken on Wandbox (file size limit exceeded server-side)
      // elixir: broken on Wandbox (file size limit exceeded server-side)
      // swift: broken on Wandbox (catatonit missing server-side)
      // Other
      r:             { compiler: 'r-4.4.1',               options: '' },
      julia:         { compiler: 'julia-1.10.5',          options: '' },
      jl:            { compiler: 'julia-1.10.5',          options: '' },
      pascal:        { compiler: 'fpc-3.2.2',             options: '' },
      pas:           { compiler: 'fpc-3.2.2',             options: '' },
      csharp:        { compiler: 'mono-6.12.0.199',       options: '' },
      'c#':          { compiler: 'mono-6.12.0.199',       options: '' },
      cs:            { compiler: 'mono-6.12.0.199',       options: '' },
      sql:           { compiler: 'sqlite-3.46.1',         options: '' },
    };

    async function executeCode(lang, code, outEl, btn) {
      const spec = EXEC_LANGS[lang.toLowerCase()];
      if (!spec) return;

      btn.disabled    = true;
      btn.textContent = '⏳';
      outEl.className = 'code-output visible';
      outEl.innerHTML = '<span class="out-meta">Running…</span>';

      try {
        const res = await fetch('https://wandbox.org/api/compile.json', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            compiler: spec.compiler,
            code:     spec.transform ? spec.transform(code) : code,
            options:  spec.options,
            ...(spec.rawOptions ? { 'compiler-option-raw': spec.rawOptions } : {}),
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        outEl.innerHTML = '';

        // Compiler errors (syntax errors etc.)
        if (data.compiler_error) {
          const el = document.createElement('span');
          el.className   = 'out-err';
          el.textContent = data.compiler_error;
          outEl.appendChild(el);
        }

        // Program stdout
        if (data.program_output) {
          const el = document.createElement('span');
          el.textContent = data.program_output;
          outEl.appendChild(el);
        }

        // Program stderr
        if (data.program_error) {
          const el = document.createElement('span');
          el.className   = 'out-err';
          el.textContent = data.program_error;
          outEl.appendChild(el);
        }

        if (!data.compiler_error && !data.program_output && !data.program_error) {
          outEl.innerHTML = '<span class="out-meta">(no output)</span>';
        }

        if (data.status && data.status !== '0') {
          const el = document.createElement('span');
          el.className   = 'out-meta';
          el.textContent = `\nexited with code ${data.status}`;
          outEl.appendChild(el);
        }
      } catch(err) {
        outEl.innerHTML = `<span class="out-err">Error: ${err.message}</span>`;
      }

      btn.disabled    = false;
      btn.textContent = '▶ Run';
    }

    function attachRunButtons(container) {
      container.querySelectorAll('pre code').forEach(codeEl => {
        const langClass = [...codeEl.classList].find(c => c.startsWith('language-'));
        if (!langClass) return;
        const lang = langClass.slice(9);
        if (!EXEC_LANGS[lang.toLowerCase()]) return;

        const pre  = codeEl.parentElement;
        const wrap = document.createElement('div');
        wrap.className = 'code-block-wrap';
        pre.replaceWith(wrap);
        wrap.appendChild(pre);

        const btn = document.createElement('button');
        btn.className   = 'run-btn';
        btn.textContent = '▶ Run';
        wrap.appendChild(btn);

        const outEl = document.createElement('div');
        outEl.className = 'code-output';
        wrap.appendChild(outEl);

        btn.addEventListener('click', () => executeCode(lang, codeEl.textContent, outEl, btn));
      });
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      preview.innerHTML = marked.parse(editor.value);
      if (typeof hljs !== 'undefined')
        preview.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      attachRunButtons(preview);
    }

    // ── Size indicator ───────────────────────────────────────────────────────
    function updateSize(encoded) {
      const kb = encoded.length / 1024;
      urlSize.textContent = kb < 1 ? encoded.length + ' B' : kb.toFixed(1) + ' KB';
      urlSize.className = kb > 1500 ? 'over' : kb > 500 ? 'warn' : '';
    }

    // ── Init from URL ────────────────────────────────────────────────────────
    const hash = location.hash.slice(1);
    try { editor.value = hash ? decode(hash) : DEFAULT; } catch(e) { editor.value = DEFAULT; }
    render();
    try { updateSize(hash || encode(editor.value)); } catch(e) {}

    // ── Live update ──────────────────────────────────────────────────────────
    let debounce;
    editor.addEventListener('input', () => {
      render();                          // immediate — never skip this
      clearTimeout(debounce);
      debounce = setTimeout(() => {     // debounce only the URL write
        try {
          const encoded = encode(editor.value);
          history.replaceState(null, '', '#' + encoded);
          updateSize(encoded);
        } catch(e) { console.warn('URL sync failed:', e); }
      }, 400);
    });

    // ── Share ────────────────────────────────────────────────────────────────
    shareBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(location.href)
        .then(() => showToast('URL copied to clipboard'))
        .catch(() => showToast('Copy failed — select the address bar manually'));
    });

    // ── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Resizable divider ────────────────────────────────────────────────────
    let dragging = false, originX = 0, originW = 0;

    divider.addEventListener('mousedown', e => {
      dragging = true;
      originX  = e.clientX;
      originW  = editorPane.getBoundingClientRect().width;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const total = document.querySelector('main').getBoundingClientRect().width;
      const newW  = Math.min(Math.max(originW + (e.clientX - originX), 120), total - 125);
      editorPane.style.flex = 'none';
      editorPane.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // ── Live mode (segment-based) ─────────────────────────────────────────────
    // Each segment is {type:'block', text:string} or {type:'blank'}
    // Blank lines are explicit spacer divs — this preserves raw whitespace visually.
    const modeBtn     = document.getElementById('modeBtn');
    const livePane    = document.getElementById('livePane');
    const liveContent = document.getElementById('liveContent');
    const mainEl      = document.querySelector('main');

    let liveMode      = false;
    let liveSegs      = [];
    let liveActiveIdx = null; // index of active block seg (always type:'block')
    let nextActiveIdx = null; // set on mousedown so blur knows where to go next
    let liveCursorPos = null; // cursor position to restore after re-render

    function segmentize(md) {
      const lines = md.split('\n');
      const segs = [];
      let cur = [], fence = false;
      for (const line of lines) {
        if (/^\s*```/.test(line)) fence = !fence;
        if (!fence && line === '') {
          if (cur.length) { segs.push({ type: 'block', text: cur.join('\n') }); cur = []; }
          segs.push({ type: 'blank' });
        } else {
          cur.push(line);
        }
      }
      if (cur.length) segs.push({ type: 'block', text: cur.join('\n') });
      return segs.length ? segs : [{ type: 'block', text: '' }];
    }

    function joinSegs() {
      return liveSegs.map(s => s.type === 'blank' ? '' : s.text).join('\n');
    }

    // Find nearest block seg relative to index, dir = 1 (forward) or -1 (backward)
    function nearestBlock(from, dir) {
      for (let i = from + dir; i >= 0 && i < liveSegs.length; i += dir)
        if (liveSegs[i].type === 'block') return i;
      return null;
    }

    function parsedDiv(md) {
      const d = document.createElement('div');
      d.innerHTML = marked.parse(md || '\u200b');
      if (typeof hljs !== 'undefined')
        d.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      attachRunButtons(d);
      return d;
    }

    function activate(idx) {
      liveActiveIdx = idx;
      nextActiveIdx = null;
      renderLive();
    }

    function renderLive() {
      liveContent.innerHTML = '';

      liveSegs.forEach((seg, i) => {
        if (seg.type === 'blank') {
          const sp = document.createElement('div');
          sp.className = 'live-spacer';
          sp.addEventListener('mousedown', () => {
            nextActiveIdx = nearestBlock(i, -1) ?? nearestBlock(i, 1);
          });
          sp.addEventListener('click', () => {
            if (liveActiveIdx === null) activate(nearestBlock(i, -1) ?? nearestBlock(i, 1));
          });
          liveContent.appendChild(sp);
          return;
        }

        // Block segment
        if (i === liveActiveIdx) {
          const ta = document.createElement('textarea');
          ta.className = 'live-ta';
          ta.value = seg.text;
          ta.spellcheck = false;

          ta.addEventListener('input', () => {
            liveSegs[i] = { type: 'block', text: ta.value };
            const val = ta.value, cursor = ta.selectionStart;
            const nl2 = val.indexOf('\n\n');

            if (nl2 !== -1) {
              // Split on double-newline immediately
              const before = val.slice(0, nl2);
              const rest   = val.slice(nl2 + 2);
              const xtra   = rest.match(/^\n*/)[0].length; // extra blank lines
              const after  = rest.slice(xtra);

              const newSegs = [];
              if (before !== '') newSegs.push({ type: 'block', text: before });
              newSegs.push({ type: 'blank' });
              for (let e = 0; e < xtra; e++) newSegs.push({ type: 'blank' });
              newSegs.push({ type: 'block', text: after });

              liveSegs.splice(i, 1, ...newSegs);

              const goNext = cursor > nl2 + 1 + xtra;
              liveActiveIdx = i + (goNext ? newSegs.length - 1 : 0);
              liveCursorPos = goNext ? cursor - nl2 - 2 - xtra : Math.min(cursor, before.length);
              renderLive();
            } else {
              ta.style.height = '0';
              ta.style.height = ta.scrollHeight + 'px';
            }
            syncFromLive();
          });

          ta.addEventListener('keydown', e => {
            const pos = ta.selectionStart, val = ta.value;

            if (e.key === 'Backspace' && pos === 0 && ta.selectionEnd === 0) {
              const prev = nearestBlock(i, -1);
              if (prev !== null) {
                e.preventDefault();
                const prevText = liveSegs[prev].text;
                const joinAt   = prevText.length;
                liveSegs[prev] = { type: 'block', text: prevText + (prevText && val ? '\n' : '') + val };
                liveSegs.splice(prev + 1, i - prev); // remove blanks + current block
                liveActiveIdx = prev;
                liveCursorPos = joinAt + (prevText ? 1 : 0);
                renderLive();
                syncFromLive();
              }
            } else if (e.key === 'ArrowUp') {
              const firstNl = val.indexOf('\n');
              if (firstNl === -1 || pos <= firstNl) {
                const prev = nearestBlock(i, -1);
                if (prev !== null) {
                  e.preventDefault();
                  liveSegs[i] = { type: 'block', text: val };
                  liveActiveIdx = prev;
                  liveCursorPos = liveSegs[prev].text.length;
                  renderLive();
                }
              }
            } else if (e.key === 'ArrowDown') {
              const lastNl = val.lastIndexOf('\n');
              if (lastNl === -1 || pos > lastNl) {
                const next = nearestBlock(i, 1);
                if (next !== null) {
                  e.preventDefault();
                  liveSegs[i] = { type: 'block', text: val };
                  liveActiveIdx = next;
                  liveCursorPos = 0;
                  renderLive();
                }
              }
            } else if (e.key === 'Escape') {
              ta.blur();
            }
          });

          ta.addEventListener('blur', () => {
            liveSegs[i] = { type: 'block', text: ta.value };
            liveActiveIdx = nextActiveIdx;
            nextActiveIdx = null;
            renderLive();
            syncFromLive();
          });

          liveContent.appendChild(ta);
          requestAnimationFrame(() => {
            ta.style.height = '0';
            ta.style.height = ta.scrollHeight + 'px';
            ta.focus();
            const p = liveCursorPos !== null ? liveCursorPos : ta.value.length;
            ta.setSelectionRange(p, p);
            liveCursorPos = null;
          });

        } else {
          const wrap = document.createElement('div');
          wrap.className = 'live-block md-body';
          wrap.append(...parsedDiv(seg.text).childNodes);
          wrap.addEventListener('mousedown', () => { nextActiveIdx = i; });
          wrap.addEventListener('click', () => { if (liveActiveIdx === null) activate(i); });
          liveContent.appendChild(wrap);
        }
      });

      // Bottom padding area — activates last block
      const last = nearestBlock(liveSegs.length, -1);
      const bottom = document.createElement('div');
      bottom.className = 'live-bottom';
      bottom.addEventListener('mousedown', () => { nextActiveIdx = last; });
      bottom.addEventListener('click', () => { if (liveActiveIdx === null) activate(last); });
      liveContent.appendChild(bottom);
    }

    function syncFromLive() {
      editor.value = joinSegs();
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        try {
          const encoded = encode(editor.value);
          history.replaceState(null, '', '#' + encoded);
          updateSize(encoded);
        } catch(e) {}
      }, 400);
    }

    modeBtn.addEventListener('click', () => {
      liveMode = !liveMode;
      if (liveMode) {
        liveSegs      = segmentize(editor.value);
        liveActiveIdx = null;
        mainEl.style.display   = 'none';
        livePane.style.display = 'flex';
        modeBtn.textContent    = 'Split';
        renderLive();
      } else {
        editor.value           = joinSegs();
        render();
        livePane.style.display = 'none';
        mainEl.style.display   = 'flex';
        modeBtn.textContent    = 'Live';
      }
    });

    // ── Mobile tabs ──────────────────────────────────────────────────────────
    editorPane.classList.add('mobile-active');

    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.target;
        editorPane.classList.toggle('mobile-active',  target === 'editorPane');
        previewPane.classList.toggle('mobile-active', target === 'previewPane');
        if (target === 'previewPane') render();
      });
    });
  </script>
</body>
</html>
