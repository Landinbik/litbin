<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mdbin</title>
  <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --header-bg: #1f2328;
      --header-text: #f0f6fc;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --header-bg: #161b22;
      --header-text: #e6edf3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      height: 48px;
      background: var(--header-bg);
      color: var(--header-text);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.4px;
      color: var(--header-text);
      text-decoration: none;
    }
    .spacer { flex: 1; }
    #urlSize {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.4);
    }
    #urlSize.warn  { color: #e3b341; }
    #urlSize.over  { color: #f85149; }

    .btn {
      padding: 5px 13px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: var(--header-text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .btn.primary:hover { filter: brightness(1.1); }

    /* ── Mobile tab bar ── */
    .tab-bar {
      display: none;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-bar button {
      flex: 1;
      padding: 9px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
    }
    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main split ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      flex-shrink: 0;
      user-select: none;
    }
    #editorPane { flex: 1; min-width: 100px; }
    #previewPane { flex: 1; min-width: 100px; }

    /* ── Divider ── */
    #divider {
      width: 5px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
    }
    #divider:hover, #divider.active { background: var(--accent); }

    /* ── Editor ── */
    #editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      font-family: 'SFMono-Regular', 'Cascadia Code', 'Consolas', 'Liberation Mono', monospace;
      font-size: 14px;
      line-height: 1.65;
      background: var(--bg);
      color: var(--text);
      tab-size: 2;
    }

    /* ── Preview ── */
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 40px;
    }
    #preview > *:first-child { margin-top: 0 !important; }

    /* GitHub-flavored prose */
    #preview h1, #preview h2 {
      border-bottom: 1px solid var(--border);
      padding-bottom: .3em;
    }
    #preview h1 { font-size: 2em;    margin: 1.5em 0 .5em; }
    #preview h2 { font-size: 1.5em;  margin: 1.5em 0 .5em; }
    #preview h3 { font-size: 1.25em; margin: 1.5em 0 .5em; }
    #preview h4, #preview h5, #preview h6 { margin: 1.2em 0 .5em; }

    #preview p  { margin-bottom: 1em; line-height: 1.75; }
    #preview a  { color: var(--accent); }
    #preview a:hover { text-decoration: underline; }

    #preview ul, #preview ol { margin-bottom: 1em; padding-left: 2em; }
    #preview li { margin-bottom: .3em; line-height: 1.75; }
    #preview li > ul, #preview li > ol { margin-bottom: 0; margin-top: .3em; }

    #preview blockquote {
      border-left: 4px solid var(--border);
      padding: 0 1em;
      color: var(--text-muted);
      margin-bottom: 1em;
    }

    #preview code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: .875em;
      font-family: 'SFMono-Regular', monospace;
    }
    #preview pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    #preview pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: .85em;
    }

    #preview table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    #preview th, #preview td {
      border: 1px solid var(--border);
      padding: 7px 13px;
      text-align: left;
    }
    #preview th { background: var(--surface); font-weight: 600; }
    #preview tr:nth-child(even) td { background: var(--surface); }

    #preview img  { max-width: 100%; border-radius: 4px; }
    #preview hr   { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    #preview input[type="checkbox"] { margin-right: 6px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1f2328;
      color: #f0f6fc;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Mobile overrides ── */
    @media (max-width: 700px) {
      .tab-bar { display: flex; }
      #divider  { display: none; }
      .pane-label { display: none; }
      #editorPane, #previewPane { display: none; flex: 1; }
      #editorPane.mobile-active, #previewPane.mobile-active { display: flex; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">mdbin</a>
    <div class="spacer"></div>
    <span id="urlSize"></span>
    <button class="btn" id="themeBtn">Dark</button>
    <button class="btn primary" id="shareBtn">Copy URL</button>
  </header>

  <div class="tab-bar">
    <button class="active" data-target="editorPane">Edit</button>
    <button data-target="previewPane">Preview</button>
  </div>

  <main>
    <div class="pane" id="editorPane">
      <div class="pane-label">Markdown</div>
      <textarea id="editor" spellcheck="false" placeholder="Write some markdown…"></textarea>
    </div>
    <div id="divider"></div>
    <div class="pane" id="previewPane">
      <div class="pane-label">Preview</div>
      <div id="preview"></div>
    </div>
  </main>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1/libs/lz-string.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const DEFAULT = `# mdbin

A markdown editor where **the document lives in the URL** — no server, no storage.
Just edit and share the link.

## Quick start

1. Type in the left pane
2. See the preview on the right
3. Hit **Copy URL** to share

## Code example

\`\`\`js
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

## Table

| Feature | Status |
|---------|--------|
| URL storage | ✅ |
| Live preview | ✅ |
| Dark mode | ✅ |
| Server required | ❌ |

> **Limit:** ~200 KB of markdown fits comfortably.
`;

    const editor   = document.getElementById('editor');
    const preview  = document.getElementById('preview');
    const shareBtn = document.getElementById('shareBtn');
    const themeBtn = document.getElementById('themeBtn');
    const urlSize  = document.getElementById('urlSize');
    const toast    = document.getElementById('toast');
    const divider  = document.getElementById('divider');
    const hljsLink = document.getElementById('hljs-theme');
    const editorPane  = document.getElementById('editorPane');
    const previewPane = document.getElementById('previewPane');

    // ── Theme ────────────────────────────────────────────────────────────────
    let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function applyTheme() {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      themeBtn.textContent = dark ? 'Light' : 'Dark';
      hljsLink.href = dark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    }
    themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });
    applyTheme();

    // ── Codec ────────────────────────────────────────────────────────────────
    const encode = t => LZString.compressToEncodedURIComponent(t);
    const decode = h => LZString.decompressFromEncodedURIComponent(h) || '';

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      preview.innerHTML = marked.parse(editor.value);
      if (typeof hljs !== 'undefined') {
        preview.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      }
    }

    // ── Size indicator ───────────────────────────────────────────────────────
    function updateSize(encoded) {
      const kb = encoded.length / 1024;
      urlSize.textContent = kb < 1 ? encoded.length + ' B' : kb.toFixed(1) + ' KB';
      urlSize.className = kb > 1500 ? 'over' : kb > 500 ? 'warn' : '';
    }

    // ── Init from URL ────────────────────────────────────────────────────────
    const hash = location.hash.slice(1);
    try { editor.value = hash ? decode(hash) : DEFAULT; } catch(e) { editor.value = DEFAULT; }
    render();
    try { updateSize(hash || encode(editor.value)); } catch(e) {}

    // ── Live update ──────────────────────────────────────────────────────────
    let debounce;
    editor.addEventListener('input', () => {
      render();                          // immediate — never skip this
      clearTimeout(debounce);
      debounce = setTimeout(() => {     // debounce only the URL write
        try {
          const encoded = encode(editor.value);
          history.replaceState(null, '', '#' + encoded);
          updateSize(encoded);
        } catch(e) { console.warn('URL sync failed:', e); }
      }, 400);
    });

    // ── Share ────────────────────────────────────────────────────────────────
    shareBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(location.href)
        .then(() => showToast('URL copied to clipboard'))
        .catch(() => showToast('Copy failed — select the address bar manually'));
    });

    // ── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Resizable divider ────────────────────────────────────────────────────
    let dragging = false, originX = 0, originW = 0;

    divider.addEventListener('mousedown', e => {
      dragging = true;
      originX  = e.clientX;
      originW  = editorPane.getBoundingClientRect().width;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const total = document.querySelector('main').getBoundingClientRect().width;
      const newW  = Math.min(Math.max(originW + (e.clientX - originX), 120), total - 125);
      editorPane.style.flex = 'none';
      editorPane.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // ── Mobile tabs ──────────────────────────────────────────────────────────
    editorPane.classList.add('mobile-active');

    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.target;
        editorPane.classList.toggle('mobile-active',  target === 'editorPane');
        previewPane.classList.toggle('mobile-active', target === 'previewPane');
        if (target === 'previewPane') render();
      });
    });
  </script>
</body>
</html>
