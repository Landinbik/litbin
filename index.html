def ms(lo, hi):

    mid=(lo+hi)//2

## How it works

Everything you type is compressed and encoded into the URL fragment (the part after \`#\`). The fragment never leaves your browser — no server ever sees your content.

**Size limits:** A few hundred KB of markdown fits comfortably in a URL. That's enough for any note, explanation, or code snippet you'd reasonably want to share. The status bar shows URL size as you type.

**Short URLs:** For cleaner links, hit **Short URL** to get a shortlink (valid for 1 year).

    function foldDrawings() {
      if (_drawingsFolded) return;
      _foldedData.clear();
      let idx = 0;
      editor.value = editor.value.replace(excalidrawBlockRe(), (match, body) => {
        const id = idx++;
        _foldedData.set(id, body);
        let count = 0;
        try { count = (JSON.parse(body.trim()).elements || []).length; } catch(e) {}
        return '```excalidraw\n\u25C6 ' + count + ' element' + (count !== 1 ? 's' : '') + ' (folded)\n```';
      });
      _drawingsFolded = true;
      foldBtn.textContent = 'Unfold \u25C6';
    }

    function unfoldDrawings() {
      if (!_drawingsFolded) return;
      let idx = 0;
      editor.value = editor.value.replace(excalidrawBlockRe(), (match, body) => {
        const id = idx++;
        const real = _foldedData.get(id);
        return real != null ? '```excalidraw\n' + real.trimEnd() + '\n```' : match;
      });
      _foldedData.clear();
      _drawingsFolded = false;
      foldBtn.textContent = 'Fold \u25C6';
    }

    function getEditorContent() {
      if (!_drawingsFolded) return editor.value;
      let idx = 0;
      return editor.value.replace(excalidrawBlockRe(), (match, body) => {
        const id = idx++;
        const real = _foldedData.get(id);
        return real != null ? '```excalidraw\n' + real.trimEnd() + '\n```' : match;
      });
    }

    foldBtn.addEventListener('click', () => {
      if (_drawingsFolded) unfoldDrawings(); else foldDrawings();
    });

    // Show/hide fold button based on content
    function updateFoldBtnVisibility() {
      foldBtn.style.display = hasExcalidrawBlocks(editor.value) ? '' : 'none';
    }

    // ── Theme ────────────────────────────────────────────────────────────────
    let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function applyTheme() {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      themeBtn.textContent = dark ? 'Light' : 'Dark';
      hljsLink.href = dark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
      if (typeof mermaid !== 'undefined')
        mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });
    }
    themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });
    applyTheme();

    // ── Codec ────────────────────────────────────────────────────────────────
    // deflate-raw compression + base64url encoding (URL-safe ASCII, no percent-encoding)
    // Real win is deflate vs LZ-string; base64url keeps URLs copy-pasteable

    function _toB64url(bytes) {
      let bin = '';
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function _fromB64url(str) {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
      const bin = atob(padded);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function encode(text) {
      const cs = new CompressionStream('deflate-raw');
      const w = cs.writable.getWriter();
      w.write(new TextEncoder().encode(text)); w.close();
      return _toB64url(new Uint8Array(await new Response(cs.readable).arrayBuffer()));
    }

    async function decode(hash) {
      try {                                         // deflate+base64url (new format)
        const bytes = _fromB64url(hash);
        const ds = new DecompressionStream('deflate-raw');
        const w = ds.writable.getWriter();
        w.write(bytes); w.close();
        return new TextDecoder().decode(await new Response(ds.readable).arrayBuffer());
      } catch(e) {
        return LZString.decompressFromEncodedURIComponent(hash) || ''; // legacy LZ-string
      }
    }

    // ── Marked options ───────────────────────────────────────────────────────
    marked.use({ breaks: true, gfm: true });

    // ── KaTeX math extension ─────────────────────────────────────────────────
    if (typeof katex !== 'undefined') {
      const renderMath = (math, display) =>
        katex.renderToString(math, { displayMode: display, throwOnError: false });

      marked.use({ extensions: [
        {
          name: 'blockMath', level: 'block',
          start(src) { return src.indexOf('$$'); },
          tokenizer(src) {
            const m = src.match(/^\$\$([\s\S]+?)\$\$/);
            if (m) return { type: 'blockMath', raw: m[0], math: m[1].trim() };
          },
          renderer(t) { return `<div class="math-block">${renderMath(t.math, true)}</div>\n`; }
        },
        {
          name: 'inlineMath', level: 'inline',
          start(src) { return src.indexOf('$'); },
          tokenizer(src) {
            const m = src.match(/^\$(\S[^$\n]*?\S|\S)\$/);
            if (m) return { type: 'inlineMath', raw: m[0], math: m[1] };
          },
          renderer(t) { return renderMath(t.math, false); }

      if (typeof mermaid === 'undefined') return;

    // ── Excalidraw diagrams (rendered directly, no iframe) ──────────────────
    let _excalidrawModule = null;
    let _excalidrawCssLoaded = false;

    async function loadExcalidraw() {
      if (!_excalidrawCssLoaded) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.18.0/dist/prod/index.css';
        document.head.appendChild(link);
        _excalidrawCssLoaded = true;
      }
      if (!_excalidrawModule) {
        const [React, ReactDOM, Ex] = await Promise.all([
          import('react'),
          import('react-dom/client'),
          import('https://esm.sh/@excalidraw/excalidraw@0.18.0?external=react,react-dom')
        ]);
        _excalidrawModule = { React: React.default || React, createRoot: ReactDOM.createRoot, Excalidraw: Ex.Excalidraw };
      }
      return _excalidrawModule;
    }

    let _excalidrawCounter = 0;
    const _excalidrawWrapCache = new Map(); // id → { wrap, root }

    function pruneExcalidrawCache(newCount) {
      for (const [id, entry] of _excalidrawWrapCache) {
        if (id >= newCount) {
          if (entry.root) try { entry.root.unmount(); } catch(e) {}
          _excalidrawWrapCache.delete(id);
        }
      }
    }

    function saveExcalidrawBack(id, elements, appState) {
      const sceneJson = JSON.stringify({
        elements: Array.from(elements),
        appState: { viewBackgroundColor: appState.viewBackgroundColor, theme: appState.theme }
      });
      if (_drawingsFolded) {
        if ((_foldedData.get(id) || '').trim() === sceneJson) return;
        _foldedData.set(id, sceneJson);
      } else {
        let count = -1;
        const updated = editor.value.replace(
          excalidrawBlockRe(),
          (match) => { count++; return count === id ? '```excalidraw\n' + sceneJson + '\n```' : match; }
        );
        if (updated === editor.value) return;
        editor.value = updated;
      }
      clearTimeout(urlDebounce);
      urlDebounce = setTimeout(async () => {
        try {
          const encoded = await encode(getEditorContent());
          history.replaceState(null, '', '#' + encoded);
          updateSize(encoded);
        } catch(e) {}
      }, 400);
    }

    function renderExcalidraw(container) {
      _excalidrawCounter = 0;
      const nodes = container.querySelectorAll('pre > code.language-excalidraw');
      for (const codeEl of nodes) {
        const id = _excalidrawCounter++;
        const cached = _excalidrawWrapCache.get(id);
        if (cached) { codeEl.parentElement.replaceWith(cached.wrap); continue; }

        let initialData = null;
        try { initialData = JSON.parse(codeEl.textContent.trim()); } catch(e) {}
        if (!initialData && _drawingsFolded && _foldedData.has(id)) {
          try { initialData = JSON.parse(_foldedData.get(id)); } catch(e) {}
        }
        initialData = initialData || { elements: [], appState: {} };

        const wrap = document.createElement('div');
        wrap.className = 'excalidraw-wrap';
        wrap.dataset.excalidrawId = id;
        const mountPoint = document.createElement('div');
        mountPoint.style.height = '100%';
        wrap.appendChild(mountPoint);
        const entry = { wrap, root: null };
        _excalidrawWrapCache.set(id, entry);
        codeEl.parentElement.replaceWith(wrap);

        const myId = id;
        const myData = initialData;
        loadExcalidraw().then(({ React, createRoot, Excalidraw }) => {
          let t;
          function onChange(els, as) {
            clearTimeout(t);
            t = setTimeout(() => saveExcalidrawBack(myId, els, as), 600);
          }
          const root = createRoot(mountPoint);
          entry.root = root;
          root.render(React.createElement(Excalidraw, { initialData: myData, onChange }));
        }).catch(err => {
          mountPoint.textContent = 'Excalidraw failed to load: ' + err.message;
          mountPoint.style.cssText = 'color:#f85149;padding:16px;font-size:13px;display:flex;align-items:center;justify-content:center;height:100%;';
        });
      }
      pruneExcalidrawCache(_excalidrawCounter);
    }

    // sort_print helpers injected before user code in sort:LANG blocks
    // Usage: sort_print(arr)  /  sort_print(arr, compare=i, swap=j)
    // compare/swap accept a single index or list of indices
    const SORT_PREAMBLES = {
      python: `def sort_print(a,compare=(),swap=()):
  _c={compare}if isinstance(compare,int)else set(compare)
  _s={swap}if isinstance(swap,int)else set(swap)
  print(*[f"[{v}]"if i in _s else f"({v})"if i in _c else str(v)for i,v in enumerate(a)])

      javascript: `function sort_print(a,{compare=[],swap=[]}={}){const c=new Set([].concat(compare)),s=new Set([].concat(swap));console.log(a.map((v,i)=>s.has(i)?'['+v+']':c.has(i)?'('+v+')':String(v)).join(' '));}
`,
      typescript: `function sort_print(a:number[],opts:{compare?:number|number[],swap?:number|number[]}={}){const c=new Set(([] as number[]).concat(opts.compare??[])),s=new Set(([] as number[]).concat(opts.swap??[]));console.log(a.map((v,i)=>s.has(i)?'['+v+']':c.has(i)?'('+v+')':String(v)).join(' '));}

      cpp: `#include<vector>
#include<set>
#include<iostream>
template<class T>void sort_print(const std::vector<T>&a,std::initializer_list<int>cmp={},std::initializer_list<int>swp={}){std::set<int>c(cmp),s(swp);for(int i=0;i<(int)a.size();i++){if(i)std::cout<<' ';if(s.count(i))std::cout<<'['<<a[i]<<']';else if(c.count(i))std::cout<<'('<<a[i]<<')';else std::cout<<a[i];}std::cout<<'\n';}

    (let ((c (tl compare)) (s (tl swap)))
      (format t "~{~a~^ ~}~%"
        (loop for v in (coerce a 'list) for i from 0
              collect (cond ((member i s) (format nil "[~a]" v))

    // Aliases
    ['python3','py'].forEach(k => SORT_PREAMBLES[k] = SORT_PREAMBLES.python);

    const outputCache = new Map(); // key: lang+'\x00'+code → {className, innerHTML}

    async function executeCode(lang, code, outEl, btn) {
      const spec = EXEC_LANGS[lang.toLowerCase()];
      if (!spec) return;

      btn.disabled    = true;
      btn.textContent = '⏳';
      outEl.className = 'code-output visible';
      outEl.innerHTML = '<span class="out-meta">Running…</span>';

      try {
        const res = await fetch('https://wandbox.org/api/compile.json', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            compiler: spec.compiler,
            code:     spec.transform ? spec.transform(code) : code,
            options:  spec.options,
            ...(spec.rawOptions ? { 'compiler-option-raw': spec.rawOptions } : {}),
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        outEl.innerHTML = '';

        // Compiler errors (syntax errors etc.)
        if (data.compiler_error) {
          const el = document.createElement('span');
          el.className   = 'out-err';
          el.textContent = data.compiler_error;
          outEl.appendChild(el);
        }

        // Program stdout
        if (data.program_output) {
          const el = document.createElement('span');
          el.textContent = data.program_output;
          outEl.appendChild(el);
        }

        // Program stderr
        if (data.program_error) {
          const el = document.createElement('span');
          el.className   = 'out-err';
          el.textContent = data.program_error;
          outEl.appendChild(el);
        }

        if (!data.compiler_error && !data.program_output && !data.program_error) {
          outEl.innerHTML = '<span class="out-meta">(no output)</span>';
        }

        if (data.status && data.status !== '0') {
          const el = document.createElement('span');
          el.className   = 'out-meta';
          el.textContent = `\nexited with code ${data.status}`;
          outEl.appendChild(el);
        }
      } catch(err) {
        outEl.innerHTML = `<span class="out-err">Error: ${err.message}</span>`;
      }

      btn.disabled    = false;
      btn.textContent = '▶ Run';
    }

    function attachRunButtons(container) {
      container.querySelectorAll('pre code').forEach(codeEl => {
        const langClass = [...codeEl.classList].find(c => c.startsWith('language-'));
        if (!langClass) return;
        const rawLang = langClass.slice(9);

        // Detect sort:LANG pattern via data attr (set in render) or class
        const isSort = !!codeEl.dataset.sortLang;
        const lang = isSort ? codeEl.dataset.sortLang : rawLang;

        if (!EXEC_LANGS[lang.toLowerCase()]) return;

        const pre  = codeEl.parentElement;
        const wrap = document.createElement('div');
        wrap.className = 'code-block-wrap';
        pre.replaceWith(wrap);
        wrap.appendChild(pre);

        const btn = document.createElement('button');
        btn.className   = 'run-btn';
        btn.textContent = isSort ? '▶ Visualize' : '▶ Run';
        wrap.appendChild(btn);

        const outEl = document.createElement('div');
        const cacheKey = rawLang + '\x00' + codeEl.textContent;
        const cached = outputCache.get(cacheKey);
        if (cached) { outEl.className = cached.className; outEl.innerHTML = cached.innerHTML; }
        else outEl.className = 'code-output';
        wrap.appendChild(outEl);

        btn.addEventListener('click', async () => {
          if (isSort) {
            await executeSortCode(lang, codeEl.textContent, outEl, wrap, btn);
          } else {
            await executeCode(lang, codeEl.textContent, outEl, btn);
          }
          outputCache.set(cacheKey, { className: outEl.className, innerHTML: outEl.innerHTML });
        });
      });
    }

    // ── Sort visualizer ──────────────────────────────────────────────────────
    // Output: one line per frame, space-separated numbers
    //   (N) = comparing (yellow), [N] = swapping/writing (red)
    //   # comment = label shown above frame
    //   Plain numbers = default color; last frame = all green
    function parseSortOutput(stdout) {
      const frames = [];
      const raw = stdout.trim();
      if (!raw) return frames;

      let currentLabel = '';

      function parseRow(line) {
        const parts = line.split(/\s+/);
        const values = [], compare = new Set(), swap = new Set();
        for (let j = 0; j < parts.length; j++) {
          const p = parts[j];
          // [N] = swap/write (red)
          const sm = p.match(/^\[(-?\d+(?:\.\d+)?)\]$/);
          if (sm) { values.push(Number(sm[1])); swap.add(j); continue; }
          // (N) = compare (yellow)
          const cm = p.match(/^\((-?\d+(?:\.\d+)?)\)$/);
          if (cm) { values.push(Number(cm[1])); compare.add(j); continue; }
          const n = Number(p);
          if (!isNaN(n)) values.push(n);
        }
        return values.length ? { values, compare, swap } : null;
      }

      for (const line of raw.split('\n')) {
        const trimmed = line.trim();
        if (trimmed === '' || trimmed === '---') continue;
        if (trimmed.startsWith('#')) { currentLabel = trimmed.slice(1).trim(); continue; }
        const row = parseRow(trimmed);
        if (row) {
          frames.push({ label: currentLabel, rows: [row] });
          currentLabel = '';
        }
      }
      return frames;
    }

    function createSortVisualizer(frames, wrapEl) {
      const viz = document.createElement('div');
      viz.className = 'sort-viz';

      // Find global max for consistent bar scaling across all frames
      let maxVal = 1, barCount = 0;
      for (const frame of frames) {
        for (const row of frame.rows) {
          barCount = Math.max(barCount, row.values.length);
          for (const v of row.values) maxVal = Math.max(maxVal, Math.abs(v));
        }
      }

      // Controls
      const controls = document.createElement('div');
      controls.className = 'sort-viz-controls';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '⏮';
      prevBtn.title = 'Previous step';
      const playBtn = document.createElement('button');
      playBtn.textContent = '▶';
      playBtn.title = 'Play/Pause';
      const nextBtn = document.createElement('button');
      nextBtn.textContent = '⏭';
      nextBtn.title = 'Next step';

      const speedLabel = document.createElement('span');
      speedLabel.textContent = 'Speed:';
      const speedSlider = document.createElement('input');
      speedSlider.type = 'range';
      speedSlider.min = '1';
      speedSlider.max = '10';
      speedSlider.value = '5';

      const frameInfo = document.createElement('span');
      frameInfo.className = 'sort-viz-frame';

      const legend = document.createElement('div');
      legend.className = 'sort-viz-legend';
      legend.innerHTML = '<span class="leg-compare">compare</span><span class="leg-swap">swap</span><span class="leg-sorted">sorted</span>';

      controls.append(prevBtn, playBtn, nextBtn, speedLabel, speedSlider, frameInfo, legend);

      // Canvas: create bars once, update heights/classes per frame
      const labelEl = document.createElement('div');
      labelEl.className = 'sort-viz-label';

      const rowEl = document.createElement('div');
      rowEl.className = 'sort-viz-row';

      // Pre-create bar elements
      const bars = [];
      const labels = [];
      for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'sort-viz-bar';
        const lbl = document.createElement('span');
        lbl.className = 'sort-viz-bar-label';
        bar.appendChild(lbl);
        rowEl.appendChild(bar);
        bars.push(bar);
        labels.push(lbl);
      }

      viz.append(controls, labelEl, rowEl);
      wrapEl.appendChild(viz);

      // State
      let currentFrame = 0;
      let playing = false;
      let interval = null;
      const isLastFrame = () => currentFrame === frames.length - 1;

      function renderFrame(idx) {
        currentFrame = Math.max(0, Math.min(idx, frames.length - 1));
        const frame = frames[currentFrame];
        const row = frame.rows[0] || { values: [], compare: new Set(), swap: new Set() };
        frameInfo.textContent = `${currentFrame + 1} / ${frames.length}`;
        labelEl.textContent = frame.label || '';

        const lastFrame = isLastFrame();
        const hasAnnotations = row.compare.size > 0 || row.swap.size > 0;

        for (let i = 0; i < barCount; i++) {
          const bar = bars[i];
          if (i < row.values.length) {
            const v = row.values[i];
            bar.style.display = '';
            bar.style.height = (Math.abs(v) / maxVal * 100) + '%';
            bar.className = 'sort-viz-bar';
            if (row.compare.has(i)) bar.classList.add('compare');
            else if (row.swap.has(i)) bar.classList.add('swap');
            else if (lastFrame && !hasAnnotations) bar.classList.add('sorted');
            labels[i].textContent = barCount <= 30 ? v : '';
            labels[i].style.display = barCount <= 30 ? '' : 'none';
          } else {
            bar.style.display = 'none';
          }
        }
      }

      function getDelay() {
        // Speed 1 = 1000ms, 5 = 200ms, 10 = 50ms
        return Math.round(1000 / Number(speedSlider.value));
      }

      function play() {
        playing = true;
        playBtn.textContent = '⏸';
        playBtn.classList.add('active');
        interval = setInterval(() => {
          if (currentFrame >= frames.length - 1) { pause(); return; }
          renderFrame(currentFrame + 1);
        }, getDelay());
      }

      function pause() {
        playing = false;
        playBtn.textContent = '▶';
        playBtn.classList.remove('active');
        clearInterval(interval);
      }

      playBtn.addEventListener('click', () => {
        if (playing) pause();
        else {
          if (currentFrame >= frames.length - 1) renderFrame(0);
          play();
        }
      });
      prevBtn.addEventListener('click', () => { pause(); renderFrame(currentFrame - 1); });
      nextBtn.addEventListener('click', () => { pause(); renderFrame(currentFrame + 1); });
      speedSlider.addEventListener('input', () => {
        if (playing) { clearInterval(interval); interval = setInterval(() => {
          if (currentFrame >= frames.length - 1) { pause(); return; }
          renderFrame(currentFrame + 1);
        }, getDelay()); }
      });

      renderFrame(0);
      return viz;
    }

    // Modified execution for sort blocks: run code, then visualize output
    async function executeSortCode(lang, code, outEl, vizContainer, btn) {
      const spec = EXEC_LANGS[lang.toLowerCase()];
      if (!spec) return;

      btn.disabled = true;
      btn.textContent = '⏳';
      outEl.className = 'code-output visible';
      outEl.innerHTML = '<span class="out-meta">Running…</span>';

      // Remove any previous visualizer
      const oldViz = vizContainer.querySelector('.sort-viz');
      if (oldViz) oldViz.remove();

      try {
        const res = await fetch('https://wandbox.org/api/compile.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            compiler: spec.compiler,
            code: (() => {
              const preamble = SORT_PREAMBLES[lang.toLowerCase()] || '';
              const userCode = spec.transform ? spec.transform(code) : code;
              return preamble ? preamble + '\n' + userCode : userCode;
            })(),
            options: spec.options,
            ...(spec.rawOptions ? { 'compiler-option-raw': spec.rawOptions } : {}),
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.compiler_error) {
          outEl.innerHTML = '';
          const el = document.createElement('span');
          el.className = 'out-err';
          el.textContent = data.compiler_error;
          outEl.appendChild(el);
        } else if (data.program_output) {
          // Parse and visualize
          const frames = parseSortOutput(data.program_output);
          if (frames.length > 0) {
            outEl.className = 'code-output'; // hide raw output
            outEl.innerHTML = '';
            createSortVisualizer(frames, vizContainer);
          } else {
            outEl.innerHTML = '';
            const el = document.createElement('span');
            el.textContent = data.program_output;
            outEl.appendChild(el);
          }
        } else {
          outEl.innerHTML = '<span class="out-meta">(no output)</span>';
        }

        if (data.program_error) {
          const el = document.createElement('span');
          el.className = 'out-err';
          el.textContent = data.program_error;
          outEl.appendChild(el);
          if (!outEl.classList.contains('visible')) outEl.className = 'code-output visible';
        }

        if (data.status && data.status !== '0') {
          const el = document.createElement('span');
          el.className = 'out-meta';
          el.textContent = `\nexited with code ${data.status}`;
          outEl.appendChild(el);
        }
      } catch(err) {
        outEl.innerHTML = `<span class="out-err">Error: ${err.message}</span>`;
      }

      btn.disabled = false;
      btn.textContent = '▶ Run';
    }

    // ── Line numbers ────────────────────────────────────────────────────────
    const lineNums = document.getElementById('lineNums');
    const editorMirror = document.getElementById('editorMirror');

    function updateLineNums() {
      // Size the mirror to match the editor's content width
      const cs = getComputedStyle(editor);
      editorMirror.style.width = editor.clientWidth + 'px';
      editorMirror.style.boxSizing = cs.boxSizing;

      // Measure each line's wrapped height using the mirror
      const lines = editor.value.split('\n');
      editorMirror.innerHTML = '';
      const spans = lines.map(line => {
        const span = document.createElement('div');
        span.textContent = line || '\u200b'; // zero-width space for empty lines
        editorMirror.appendChild(span);
        return span;
      });

      // Build line number elements with matching heights
      let html = '';
      for (let i = 0; i < spans.length; i++) {
        const h = spans[i].offsetHeight;
        html += `<span class="line-num" style="height:${h}px">${i + 1}</span>`;
      }
      lineNums.innerHTML = html;
    }

    editor.addEventListener('input', updateLineNums);
    editor.addEventListener('scroll', () => { lineNums.scrollTop = editor.scrollTop; });
    new ResizeObserver(updateLineNums).observe(editor);

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      preview.innerHTML = marked.parse(editor.value);
      // Fix sort:LANG — swap class for hljs, preserve original in data attr
      preview.querySelectorAll('pre code[class*="language-sort"]').forEach(el => {
        const m = el.className.match(/language-sort([:-])(\S+)/);

        preview.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      attachRunButtons(preview);
      renderMermaid(preview);
      renderExcalidraw(preview);

    // ── Settings ─────────────────────────────────────────────────────────────
    const settingsBtn  = document.getElementById('settingsBtn');
    const settingsMenu = document.getElementById('settingsMenu');
    const showWordCount = document.getElementById('showWordCount');
    const wordCountEl  = document.getElementById('wordCount');

    settingsBtn.addEventListener('click', e => {

    document.addEventListener('click', () => settingsMenu.classList.remove('open'));
    settingsMenu.addEventListener('click', e => e.stopPropagation());

    showWordCount.checked = localStorage.getItem('litbin-wordcount') === '1';
    showWordCount.addEventListener('change', () => {
      localStorage.setItem('litbin-wordcount', showWordCount.checked ? '1' : '0');
      updateWordCount();
    });

    function updateWordCount() {
      if (!showWordCount.checked) { wordCountEl.style.display = 'none'; return; }
      const text = editor.value.trim();
      const words = text ? text.split(/\s+/).length : 0;

    // ── Size indicator ───────────────────────────────────────────────────────
    function updateSize(encoded) {
      const kb = encoded.length / 1024;
      urlSize.textContent = kb < 1 ? encoded.length + ' B' : kb.toFixed(1) + ' KB';
      urlSize.className = kb > 1500 ? 'over' : kb > 500 ? 'warn' : '';
    }

    // ── Init from URL ────────────────────────────────────────────────────────
    (async () => {
      const hash = location.hash.slice(1);
      try { editor.value = hash ? await decode(hash) : DEFAULT; } catch(e) { editor.value = DEFAULT; }
      updateFoldBtnVisibility();
      if (hasExcalidrawBlocks(editor.value)) foldDrawings();
      render();
      try { updateSize(hash ? hash : await encode(getEditorContent())); } catch(e) {}
    })();

    // ── List editing helpers ────────────────────────────────────────────────
    const LIST_RE = /^(\s*)([-*+]|\d+[.)]) (.*)$/;
    const EMPTY_LIST_RE = /^(\s*)([-*+]|\d+[.)]) $/;

    function getLine(text, pos) {
      const start = text.lastIndexOf('\n', pos - 1) + 1;
      const end = text.indexOf('\n', pos);
      return { start, end: end === -1 ? text.length : end, text: text.slice(start, end === -1 ? text.length : end) };
    }

    function nextNum(marker) {
      const n = parseInt(marker);
      return isNaN(n) ? marker : (n + 1) + marker.slice(-1);
    }

    function handleListKeys(el, e) {
      const pos = el.selectionStart, val = el.value;
      const line = getLine(val, pos);
      const m = line.text.match(LIST_RE);

      if (e.key === 'Tab' && m) {
        e.preventDefault();
        if (e.shiftKey) {
          if (m[1].length >= 2) {
            el.value = val.slice(0, line.start) + line.text.slice(2) + val.slice(line.end);
            el.selectionStart = el.selectionEnd = pos - 2;
          }
        } else {
          el.value = val.slice(0, line.start) + '  ' + line.text + val.slice(line.end);
          el.selectionStart = el.selectionEnd = pos + 2;
        }
        el.dispatchEvent(new Event('input'));
        return true;
      }

      if (e.key === 'Enter' && !e.shiftKey && m) {
        e.preventDefault();
        if (EMPTY_LIST_RE.test(line.text)) {
          el.value = val.slice(0, line.start) + val.slice(line.end + 1);
          el.selectionStart = el.selectionEnd = line.start;
        } else {
          const prefix = '\n' + m[1] + nextNum(m[2]) + ' ';
          el.value = val.slice(0, pos) + prefix + val.slice(pos);
          el.selectionStart = el.selectionEnd = pos + prefix.length;
        }
        el.dispatchEvent(new Event('input'));
        return true;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        const end = el.selectionEnd;
        el.value = val.substring(0, pos) + '  ' + val.substring(end);
        el.selectionStart = el.selectionEnd = pos + 2;
        el.dispatchEvent(new Event('input'));
        return true;
      }

      return false;
    }

    // ── Editor keydown ──────────────────────────────────────────────────────
    editor.addEventListener('keydown', e => { handleListKeys(editor, e); });

    // ── Live update ──────────────────────────────────────────────────────────
    let urlDebounce;
    editor.addEventListener('input', () => {
      updateFoldBtnVisibility();
      render();                               // immediate — never skip this
      clearTimeout(urlDebounce);
      urlDebounce = setTimeout(async () => {  // debounce only the URL write

    });

    // ── Share ────────────────────────────────────────────────────────────────
    shareBtn.addEventListener('click', () => {

    // ── Short URL (LinkShrink — CORS-friendly, 1-year TTL) ─────────────────
    const shortBtn = document.getElementById('shortBtn');
    shortBtn.addEventListener('click', async () => {

    // ── Import ───────────────────────────────────────────────────────────────
    const importBtn  = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', () => {
      const file = importFile.files[0];

    // ── Export ───────────────────────────────────────────────────────────────
    document.getElementById('exportBtn').addEventListener('click', () => {
      const text = editor.value;

      const blob = new Blob([text], { type: 'text/markdown' });

    // ── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Resizable divider ────────────────────────────────────────────────────
    let dragging = false, originX = 0, originW = 0;

    divider.addEventListener('mousedown', e => {
      dragging = true;
      originX  = e.clientX;
      originW  = editorPane.getBoundingClientRect().width;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const total = document.querySelector('main').getBoundingClientRect().width;
      const newW  = Math.min(Math.max(originW + (e.clientX - originX), 120), total - 125);
      editorPane.style.flex = 'none';
      editorPane.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // ── Live mode (segment-based) ─────────────────────────────────────────────
    // Each segment is {type:'block', text:string} or {type:'blank'}
    // Blank lines are explicit spacer divs — this preserves raw whitespace visually.
    const modeBtn     = document.getElementById('modeBtn');
    const livePane    = document.getElementById('livePane');
    const liveContent = document.getElementById('liveContent');
    const mainEl      = document.querySelector('main');

    let liveMode      = false;
    let liveSegs      = [];
    let liveActiveIdx = null; // index of active block seg (always type:'block')
    let nextActiveIdx = null; // set on mousedown so blur knows where to go next
    let liveCursorPos = null; // cursor position to restore after re-render

    function segmentize(md) {
      const lines = md.split('\n');
      const segs = [];
      let cur = [], fence = false;
      for (const line of lines) {
        if (/^\s*```/.test(line)) fence = !fence;
        if (!fence && line === '') {
          if (cur.length) { segs.push({ type: 'block', text: cur.join('\n') }); cur = []; }
          segs.push({ type: 'blank' });
        } else {
          cur.push(line);
        }
      }
      if (cur.length) segs.push({ type: 'block', text: cur.join('\n') });
      return segs.length ? segs : [{ type: 'block', text: '' }];
    }

    function joinSegs() {
      return liveSegs.map(s => s.type === 'blank' ? '' : s.text).join('\n');
    }

    // Find nearest block seg relative to index, dir = 1 (forward) or -1 (backward)
    function nearestBlock(from, dir) {
      for (let i = from + dir; i >= 0 && i < liveSegs.length; i += dir)
        if (liveSegs[i].type === 'block') return i;
      return null;
    }

    function parsedDiv(md) {
      const d = document.createElement('div');
      d.innerHTML = marked.parse(md || '\u200b');
      d.querySelectorAll('pre code[class*="language-sort"]').forEach(el => {
        const m = el.className.match(/language-sort([:-])(\S+)/);
        if (m) {
          el.dataset.sortLang = m[2];
          el.classList.remove('language-sort' + m[1] + m[2]);
          el.classList.add('language-' + m[2]);
        }
      });
      if (typeof hljs !== 'undefined')
        d.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      attachRunButtons(d);
      renderMermaid(d);
      renderExcalidraw(d);
      return d;
    }

    function activate(idx) {
      liveActiveIdx = idx;
      nextActiveIdx = null;
      renderLive();
    }

    let _rendering = false;

    // Event delegation for spacers, blocks, and bottom pad — avoids per-element listeners
    liveContent.addEventListener('mousedown', e => {
      if (e.target.closest('.excalidraw-wrap')) return;
      const el = e.target.closest('[data-seg]');
      if (!el || e.target.closest('.run-btn')) return;
      const idx = +el.dataset.seg;
      if (el.classList.contains('live-spacer') || el.classList.contains('live-bottom')) {
        nextActiveIdx = nearestBlock(idx, -1) ?? nearestBlock(idx, 1);
      } else if (el.classList.contains('live-block')) {
        nextActiveIdx = idx;
      }
    });
    liveContent.addEventListener('click', e => {
      if (e.target.closest('.excalidraw-wrap')) return;
      const el = e.target.closest('[data-seg]');
      if (!el || e.target.closest('.run-btn')) return;
      if (liveActiveIdx !== null) return;
      const idx = +el.dataset.seg;
      if (el.classList.contains('live-spacer') || el.classList.contains('live-bottom')) {
        activate(nearestBlock(idx, -1) ?? nearestBlock(idx, 1));
      } else if (el.classList.contains('live-block')) {
        activate(idx);
      }
    });

    function renderLive() {
      _rendering = true;
      liveContent.innerHTML = '';

      liveSegs.forEach((seg, i) => {
        if (seg.type === 'blank') {
          const sp = document.createElement('div');
          sp.className = 'live-spacer';
          sp.dataset.seg = i;
          liveContent.appendChild(sp);
          return;
        }

        // Block segment
        if (i === liveActiveIdx) {
          const ta = document.createElement('textarea');
          ta.className = 'live-ta';
          ta.value = seg.text;
          ta.spellcheck = false;

          ta.addEventListener('input', () => {
            liveSegs[i] = { type: 'block', text: ta.value };
            const val = ta.value, cursor = ta.selectionStart;
            const insideFence = (text, pos) => (text.slice(0, pos).match(/^```/mg) || []).length % 2 === 1;
            let nl2 = -1;
            { let s = 0, p; while ((p = val.indexOf('\n\n', s)) !== -1) { if (!insideFence(val, p)) { nl2 = p; break; } s = p + 1; } }

            if (nl2 !== -1) {
              // Split on double-newline immediately
              const before = val.slice(0, nl2);
              const rest   = val.slice(nl2 + 2);
              const xtra   = rest.match(/^\n*/)[0].length; // extra blank lines
              const after  = rest.slice(xtra);

              const newSegs = [];
              if (before !== '') newSegs.push({ type: 'block', text: before });
              newSegs.push({ type: 'blank' });
              for (let e = 0; e < xtra; e++) newSegs.push({ type: 'blank' });
              newSegs.push({ type: 'block', text: after });

              liveSegs.splice(i, 1, ...newSegs);

              const goNext = cursor > nl2 + 1 + xtra;
              liveActiveIdx = i + (goNext ? newSegs.length - 1 : 0);
              liveCursorPos = goNext ? cursor - nl2 - 2 - xtra : Math.min(cursor, before.length);
              renderLive();
            } else {
              ta.style.height = '0';
              ta.style.height = ta.scrollHeight + 'px';
            }
            syncFromLive();
          });

          ta.addEventListener('keydown', e => {
            const pos = ta.selectionStart, val = ta.value;

            if (handleListKeys(ta, e)) return;

            if (e.key === 'Backspace' && pos === 0 && ta.selectionEnd === 0) {
              const prev = nearestBlock(i, -1);
              if (prev !== null) {
                e.preventDefault();
                const prevText = liveSegs[prev].text;
                const joinAt   = prevText.length;
                liveSegs[prev] = { type: 'block', text: prevText + (prevText && val ? '\n' : '') + val };
                liveSegs.splice(prev + 1, i - prev); // remove blanks + current block
                liveActiveIdx = prev;
                liveCursorPos = joinAt + (prevText ? 1 : 0);
                renderLive();
                syncFromLive();
              }
            } else if (e.key === 'ArrowUp') {
              const firstNl = val.indexOf('\n');
              if (firstNl === -1 || pos <= firstNl) {
                const prev = nearestBlock(i, -1);
                if (prev !== null) {
                  e.preventDefault();
                  liveSegs[i] = { type: 'block', text: val };
                  liveActiveIdx = prev;
                  liveCursorPos = liveSegs[prev].text.length;
                  renderLive();
                }
              }
            } else if (e.key === 'ArrowDown') {
              const lastNl = val.lastIndexOf('\n');
              if (lastNl === -1 || pos > lastNl) {
                const next = nearestBlock(i, 1);
                if (next !== null) {
                  e.preventDefault();
                  liveSegs[i] = { type: 'block', text: val };
                  liveActiveIdx = next;
                  liveCursorPos = 0;
                  renderLive();
                }
              }
            } else if (e.key === 'Escape') {
              ta.blur();
            }
          });

          ta.addEventListener('blur', () => {
            if (_rendering) return;
            liveSegs[i] = { type: 'block', text: ta.value };
            liveActiveIdx = nextActiveIdx;
            nextActiveIdx = null;
            renderLive();
            syncFromLive();
          });

          liveContent.appendChild(ta);
          requestAnimationFrame(() => {
            ta.style.height = '0';
            ta.style.height = Math.max(ta.scrollHeight, 31) + 'px';
            ta.focus();
            const p = liveCursorPos !== null ? liveCursorPos : ta.value.length;
            ta.setSelectionRange(p, p);
            liveCursorPos = null;
          });

        } else {
          const wrap = document.createElement('div');
          wrap.className = 'live-block md-body';
          wrap.dataset.seg = i;
          wrap.append(...parsedDiv(seg.text).childNodes);
          // Add edit button to excalidraw blocks
          const exWrap = wrap.querySelector('.excalidraw-wrap');
          if (exWrap) {
            exWrap.style.position = 'relative';
            const editBtn = document.createElement('button');
            editBtn.className = 'excalidraw-edit-btn';
            editBtn.textContent = 'Edit source';
            editBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              activate(i);
            });
            exWrap.appendChild(editBtn);
          }
          liveContent.appendChild(wrap);
        }
      });

      // Bottom padding area — activates last block
      const bottom = document.createElement('div');
      bottom.className = 'live-bottom';
      bottom.dataset.seg = liveSegs.length;
      liveContent.appendChild(bottom);

      _rendering = false;
    }

    let liveDebounce;
    function syncFromLive() {
      editor.value = joinSegs();
      clearTimeout(liveDebounce);
      liveDebounce = setTimeout(async () => {
        try {
          const encoded = await encode(getEditorContent());
          history.replaceState(null, '', '#' + encoded);
          updateSize(encoded);
        } catch(e) {}
      }, 400);
    }

    modeBtn.addEventListener('click', () => {
      liveMode = !liveMode;
      if (liveMode) {
        unfoldDrawings(); // live mode needs real content
        liveSegs      = segmentize(editor.value);
        liveActiveIdx = null;
        mainEl.style.display   = 'none';
        livePane.style.display = 'flex';
        modeBtn.textContent    = 'Split';
        renderLive();
      } else {
        editor.value           = joinSegs();
        render();
        livePane.style.display = 'none';
        mainEl.style.display   = 'flex';
        modeBtn.textContent    = 'Live';
      }
    });

    // ── Mobile tabs ──────────────────────────────────────────────────────────
    editorPane.classList.add('mobile-active');

    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.target;
        editorPane.classList.toggle('mobile-active',  target === 'editorPane');
        previewPane.classList.toggle('mobile-active', target === 'previewPane');
        if (target === 'previewPane') render();
      });
    });
  </script>
</body>
</html>
