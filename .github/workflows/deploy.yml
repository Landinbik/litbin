name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject commit info into HTML
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%ci | cut -d' ' -f1)
          COMMIT_TIME=$(git log -1 --format=%ci | cut -d' ' -f2 | cut -d':' -f1-2)
          COMMIT_AUTHOR=$(git log -1 --format=%an)
          sed -i "s|<!-- COMMIT_INFO -->|<a href=\"https://github.com/Landinbik/litbin/commit/$COMMIT_SHA\" style=\"text-decoration:none;color:inherit\">$COMMIT_SHA @ $COMMIT_DATE $COMMIT_TIME</a>|g" index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
